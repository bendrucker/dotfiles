# Declarative symlink map
# Format: source:target (~ expands to $HOME)
# Processed by scripts/install-links

git/config:~/.config/git/config
git/ignore:~/.config/git/ignore
http/curlrc:~/.config/curl/.curlrc
system/editorconfig:~/.editorconfig
terminal/ghostty.config:~/.config/ghostty/config
worktrunk/config.toml:~/.config/worktrunk/config.toml
zsh/zshenv:~/.zshenv
zsh/zshrc:~/.config/zsh/.zshrc

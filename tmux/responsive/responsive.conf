# Responsive layout for small clients (phone, SSH, Mosh).
# As the attached client shrinks, degrade gracefully: compact the status bar,
# shorten window names, and auto-zoom multi-pane windows so one pane stays usable.
#
# How it works: the status-bar and window-name *formats* (in appearance.conf and
# status.conf) reference the predicate defined here. tmux re-evaluates those
# formats on every redraw, including on resize, so they self-heal and need no hook.
# The status bar is never hidden. The *behavioral* pieces (auto-zoom, popup
# sizing) use hooks.

# Breakpoint. Override per-machine in tmux.conf.local if desired.
set -g @resp_narrow 80

# Narrowness predicate, resolving to 1 (true) or 0. Reference it elsewhere as
# #{E:@resp_is_narrow}, which expands the stored format in the caller's context.
#
# Note the arithmetic form #{e|<:...}: tmux's plain #{<:...} compares as STRINGS
# ("180" < "80" is true because '1' < '8'), which silently breaks once a dimension
# reaches three digits. #{e|<:...} compares numerically.
#
# Guard on #{?#{client_width},...}: client_width is EMPTY when a format resolves
# with no settled client size, e.g. a hook firing mid-attach before the real
# terminal size arrives. Empty compares numerically as 0, so the bare form would
# treat an unsized client as narrower than any breakpoint. An unknown dimension
# must mean "not small": only compress when the size is positively known and below
# the cap.
set -g @resp_is_narrow "#{?#{client_width},#{e|<:#{client_width},#{@resp_narrow}},0}"

# The window name to display: the live pane title when auto-renaming, else the
# manually-set name (#W). Apps like Claude Code prepend a "(Machine) " prefix
# to pane titles, which is pure noise here, so strip it. #{automatic-rename} is
# already 1/0. Single quotes so \( reaches tmux's regex engine unmolested.
set -g @resp_winname '#{?#{automatic-rename},#{=24:#{s/^\([^)]*\) //:pane_title}},#W}'

# Narrow status bar pieces (referenced by the wrappers in status.conf).
# Commas inside #[...] are only legal because these live in their own options;
# inlined into a #{?...} they would split its branches.
#
# Compact session pill. The name shows in full (capped at 12) while the
# window list is short, and truncates to 4 chars once the session has enough
# windows to crowd the bar. Flips red while the prefix is pressed: on a
# phone, keyboard latency makes prefix state easy to lose track of. The pill color is its own option because the rounded caps
# need it as a foreground.
set -g @resp_sl_bg '#{?client_prefix,#{@thm_red},#{@thm_green}}'
set -g @resp_sl_narrow '#[fg=#{E:@resp_sl_bg}]#[fg=#{@thm_crust},bg=#{E:@resp_sl_bg},bold]#{?#{e|>:#{session_windows},4},#{=/4/…:session_name},#{=/12/…:session_name}}#[nobold]#[fg=#{E:@resp_sl_bg},bg=default]#[default] '

# Non-current windows: a rounded index chip (caps + digit = 3 cells), sized to
# be tappable (mouse is on, so a status-line tap selects the window) and
# matching the catppuccin pill look. Chip colors live in their own options
# both to keep their commas out of #[...] conditionals and because the rounded
# caps need the background color as a foreground.
set -g @resp_chip_bg '#{?#{||:#{window_bell_flag},#{window_activity_flag}},#{@thm_yellow},#{@thm_surface_0}}'
set -g @resp_chip_fg '#{?#{||:#{window_bell_flag},#{window_activity_flag}},#{@thm_crust},#{@thm_overlay_1}}'
set -g @resp_ws_narrow '#[fg=#{E:@resp_chip_bg}]#[fg=#{E:@resp_chip_fg},bg=#{E:@resp_chip_bg}]#I#[fg=#{E:@resp_chip_bg},bg=default]#[default]'

# Current window: rounded pill with index block + name + zoom flag. The name
# is #W (the process name under automatic-rename, the manual name otherwise);
# pane_title is too noisy at this width. window_name spelled out: the =N
# truncation modifier ignores #W-style aliases.
set -g @resp_wsc_narrow '#[fg=#{@thm_mauve}]#[fg=#{@thm_crust},bg=#{@thm_mauve},bold]#I #[fg=#{@thm_fg},bg=#{@thm_surface_1},nobold] #{=/12/…:window_name}#{?window_zoomed_flag, 󰁌,}#[fg=#{@thm_surface_1},bg=default]#[default]'

# Auto-zoom: on a narrow client, collapse a multi-pane window to a single zoomed
# pane so the focused pane stays tappable. @resp_autozoom marks ownership so we
# never fight you: unset = idle, 'auto' = we zoomed it, 'user' = you toggled zoom
# manually (the prefix-z binding sets this) so we leave it alone. We zoom only
# when you are the sole client viewing the window (zoom is window state shared by
# every client, so zooming for a narrow client would collapse a wide client's
# view of the same window). The status bar is intentionally exempt: it carries the
# prefix indicator and other state you want visible even when a pane is zoomed.
#
# The three conditions are named once here and referenced by the hooks below, so
# the same verdict drives every triggering event. #{E:...} recursively expands the
# stored format in the hook's (triggering client's) context.
set -g @resp_zoom_in      "#{&&:#{E:@resp_is_narrow},#{&&:#{e|>:#{window_panes},1},#{&&:#{!=:#{window_zoomed_flag},1},#{&&:#{==:#{window_active_clients},1},#{==:#{@resp_autozoom},}}}}}"
set -g @resp_zoom_restore "#{&&:#{==:#{E:@resp_is_narrow},0},#{&&:#{==:#{@resp_autozoom},auto},#{==:#{window_zoomed_flag},1}}}"
set -g @resp_zoom_release "#{&&:#{==:#{E:@resp_is_narrow},0},#{!=:#{@resp_autozoom},}}"

# Popups should be near-fullscreen on a narrow client (60-80% of 43x34 is an
# unusable postage stamp) and keep their desktop sizes otherwise. display-popup
# sizes are not format-expanded, so bindings we own dispatch via `if -F`
# (navigation.conf). The fzf plugins (fuzzback, floax, tmux-fzf) read their
# sizing from global options/environment on every invocation, so the hooks
# below flip those globals whenever the narrow/wide verdict can change. The
# conditional formats expand in the triggering client's context, like the zoom
# predicates. Wide values mirror the boot defaults in navigation.conf and
# search.conf so reloads are idempotent. Server-wide globals track the last
# event's client: a desktop popup opened right after a phone event runs
# fullscreen once, then self-heals on the next desktop event. Same trade-off
# class as auto-zoom.

# Re-evaluate on any event that can change the narrow/wide verdict or the active
# window: a terminal resize, attaching an already-correctly-sized client (no resize
# fires), switching the active window (a multi-pane window should collapse on a
# phone), or moving a client between sessions. client-resized alone misses the last
# three. Each event replaces (not appends) its hook via -g, so re-sourcing this file
# rebuilds cleanly instead of stacking duplicates.
set-hook -g client-resized {
  if -F "#{E:@resp_zoom_in}"      { resize-pane -Z ; set -w @resp_autozoom auto }
  if -F "#{E:@resp_zoom_restore}" { resize-pane -Z }
  if -F "#{E:@resp_zoom_release}" { set -uw @resp_autozoom }
  set -gF @fuzzback-popup-size "#{?#{E:@resp_is_narrow},100%,80%}"
  set -gF @fuzzback-hide-preview "#{?#{E:@resp_is_narrow},1,0}"
  setenv -gF FLOAX_WIDTH "#{?#{E:@resp_is_narrow},100%,80%}"
  setenv -gF FLOAX_HEIGHT "#{?#{E:@resp_is_narrow},100%,80%}"
  setenv -gF TMUX_FZF_OPTIONS "#{?#{E:@resp_is_narrow},-p -w 100% -h 100%,-p -w 60% -h 60%}"
  setenv -gF TMUX_FZF_PREVIEW "#{?#{E:@resp_is_narrow},0,1}"
}
set-hook -g client-attached {
  if -F "#{E:@resp_zoom_in}"      { resize-pane -Z ; set -w @resp_autozoom auto }
  if -F "#{E:@resp_zoom_restore}" { resize-pane -Z }
  if -F "#{E:@resp_zoom_release}" { set -uw @resp_autozoom }
  set -gF @fuzzback-popup-size "#{?#{E:@resp_is_narrow},100%,80%}"
  set -gF @fuzzback-hide-preview "#{?#{E:@resp_is_narrow},1,0}"
  setenv -gF FLOAX_WIDTH "#{?#{E:@resp_is_narrow},100%,80%}"
  setenv -gF FLOAX_HEIGHT "#{?#{E:@resp_is_narrow},100%,80%}"
  setenv -gF TMUX_FZF_OPTIONS "#{?#{E:@resp_is_narrow},-p -w 100% -h 100%,-p -w 60% -h 60%}"
  setenv -gF TMUX_FZF_PREVIEW "#{?#{E:@resp_is_narrow},0,1}"
}
set-hook -g session-window-changed {
  if -F "#{E:@resp_zoom_in}"      { resize-pane -Z ; set -w @resp_autozoom auto }
  if -F "#{E:@resp_zoom_restore}" { resize-pane -Z }
  if -F "#{E:@resp_zoom_release}" { set -uw @resp_autozoom }
  set -gF @fuzzback-popup-size "#{?#{E:@resp_is_narrow},100%,80%}"
  set -gF @fuzzback-hide-preview "#{?#{E:@resp_is_narrow},1,0}"
  setenv -gF FLOAX_WIDTH "#{?#{E:@resp_is_narrow},100%,80%}"
  setenv -gF FLOAX_HEIGHT "#{?#{E:@resp_is_narrow},100%,80%}"
  setenv -gF TMUX_FZF_OPTIONS "#{?#{E:@resp_is_narrow},-p -w 100% -h 100%,-p -w 60% -h 60%}"
  setenv -gF TMUX_FZF_PREVIEW "#{?#{E:@resp_is_narrow},0,1}"
}
set-hook -g client-session-changed {
  if -F "#{E:@resp_zoom_in}"      { resize-pane -Z ; set -w @resp_autozoom auto }
  if -F "#{E:@resp_zoom_restore}" { resize-pane -Z }
  if -F "#{E:@resp_zoom_release}" { set -uw @resp_autozoom }
  set -gF @fuzzback-popup-size "#{?#{E:@resp_is_narrow},100%,80%}"
  set -gF @fuzzback-hide-preview "#{?#{E:@resp_is_narrow},1,0}"
  setenv -gF FLOAX_WIDTH "#{?#{E:@resp_is_narrow},100%,80%}"
  setenv -gF FLOAX_HEIGHT "#{?#{E:@resp_is_narrow},100%,80%}"
  setenv -gF TMUX_FZF_OPTIONS "#{?#{E:@resp_is_narrow},-p -w 100% -h 100%,-p -w 60% -h 60%}"
  setenv -gF TMUX_FZF_PREVIEW "#{?#{E:@resp_is_narrow},0,1}"
}

# A manual `prefix z` marks the window user-owned so auto-zoom leaves it alone.
bind z resize-pane -Z \; set -w @resp_autozoom user

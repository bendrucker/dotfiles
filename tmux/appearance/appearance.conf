# Catppuccin theme
set -g @plugin 'catppuccin/tmux'
set -goq @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_status_right_separator '#[bg=default]'
set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_session_icon "󰆍 "
set -g @catppuccin_session_text "#[bold] #S#[nobold]"
# On a narrow client, clip the window name to 10 chars. Otherwise keep the
# original behavior: auto-named windows clip to 24, manual names stay full.
# (@resp_is_narrow / @resp_winname are defined in responsive.conf.)
set -g @catppuccin_window_text " #{?#{E:@resp_is_narrow},#{=10:#{E:@resp_winname}},#{?#{==:#{automatic-rename},on},#{=24:#{pane_title}},#W}}"
set -g @catppuccin_window_current_text " #{?#{E:@resp_is_narrow},#{=10:#{E:@resp_winname}},#{?#{==:#{automatic-rename},on},#{=24:#{pane_title}},#W}}"

# Sync catppuccin flavor with macOS appearance (fallback for watch-theme-change daemon).
# theme-sync-tmux self-gates, so it's safe to call unconditionally on every focus event.
set-hook -g client-focus-in 'run-shell -b "$ZSH/theme/bin/theme-sync-tmux"'

# Status bar
set -g status-position bottom
set -g status-left-length 100
set -g status-right-length 100

# Bolder selection highlight for choose-tree / copy mode
set -g mode-style "bg=#{@thm_surface_2},bold"

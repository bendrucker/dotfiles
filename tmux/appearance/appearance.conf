# Catppuccin theme
set -g @plugin 'catppuccin/tmux'
set -goq @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_status_right_separator '#[bg=default]'
set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_session_icon "󰆍 "
set -g @catppuccin_session_text "#[bold] #S#[nobold]"
# Clip the window name to 10 chars on a narrow client; otherwise show the full
# display name (auto-named windows clip to 24, manual names stay full).
set -g @catppuccin_window_text " #{?#{E:@resp_is_narrow},#{=10:#{E:@resp_winname}},#{E:@resp_winname}}"
set -g @catppuccin_window_current_text " #{?#{E:@resp_is_narrow},#{=10:#{E:@resp_winname}},#{E:@resp_winname}}"

# Sync catppuccin flavor with macOS appearance (fallback for watch-theme-change daemon).
# theme-sync-tmux self-gates, so it's safe to call unconditionally on every focus event.
set-hook -g client-focus-in 'run-shell -b "$ZSH/theme/bin/theme-sync-tmux"'

# Status bar
set -g status-position bottom
set -g status-left-length 100
set -g status-right-length 100

# Bolder selection highlight for choose-tree / copy mode
set -g mode-style "bg=#{@thm_surface_2},bold"

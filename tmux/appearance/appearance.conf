# Catppuccin theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_session_icon "󰆍 "
set -g @catppuccin_window_text " #W#(_tmux-window-label '#{pane_title}')"
set -g @catppuccin_window_current_text " #W#(_tmux-window-label '#{pane_title}')"

# Sync catppuccin flavor with macOS appearance (fallback for tmux-style-watch daemon)
set-hook -g client-focus-in 'run-shell -b "tmux-style-sync"'

# Status bar
set -g status-position top
set -g status-left-length 100
set -g status-right-length 100

# Bolder selection highlight for choose-tree / copy mode
set -g mode-style "bg=#{@thm_surface_2},bold"

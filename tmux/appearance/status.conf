set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{?#{==:#(_tmux-bell-count),0},,#{E:@catppuccin_status_bell}}"

# Override catppuccin's baked-in window-status-format after the plugin runs.
# - Custom names (prefix ,) replace pane_title entirely via automatic-rename check
# - Worktree icon prepended by _tmux-is-wt when pane is in a git worktree
# - Titles capped at 24 chars to prevent status-bar overflow
set -g window-status-format "#[fg=#dce0e8,bg=#{@thm_overlay_2}] #I #[fg=#4c4f69,bg=#{@thm_surface_0}]#(_tmux-is-wt '#{pane_current_path}') #{?automatic-rename,#{=24:pane_title},#W} "
set -g window-status-current-format "#[fg=#dce0e8,bg=#{@thm_mauve}] #I #[fg=#4c4f69,bg=#{@thm_surface_1}]#(_tmux-is-wt '#{pane_current_path}') #{?automatic-rename,#{=24:pane_title},#W} "

# Pane border labels — hidden when a window has only one pane (shells, editors,
# and Claude Code already self-identify inside the pane). When split, show just
# the pane index centered on the top border so prefix+<n> navigation is easy.
set -g pane-border-format "#[align=centre]─ #P#{?window_zoomed_flag, 󰊓 ,}#(_tmux-pane-wt '#{pane_id}') ─"
set -g pane-border-style "fg=#{@thm_overlay_0}"
set -g pane-active-border-style "fg=#{@thm_blue}"

set-hook -g window-layout-changed 'set -w -F pane-border-status "#{?#{>:#{window_panes},1},top,off}"'
set-hook -g after-split-window    'set -w -F pane-border-status "#{?#{>:#{window_panes},1},top,off}"'
set-hook -g pane-exited           'set -w -F pane-border-status "#{?#{>:#{window_panes},1},top,off}"'

# Narrow clients swap the session module for a compact label with a prefix
# indicator (defined in responsive.conf).
set -g status-left "#{?#{E:@resp_is_narrow},#{E:@resp_sl_narrow},#{E:@catppuccin_status_session}#[bg=default] }"

# Catppuccin ships no bell module, so build @catppuccin_status_bell from the
# @catppuccin_bell_* inputs (set in alerts.conf) with its own module builder.
# This must run after the plugin loads, so it lives here rather than alongside
# the inputs.
%hidden MODULE_NAME="bell"
source -F "${TMUX_PLUGIN_MANAGER_PATH}/tmux/utils/status_module.conf"

# Leading space keeps the bell pill from touching the last window entry.
set -g status-right "#{?#{==:#(_tmux-bell-count),0},, #{E:@catppuccin_status_bell}}"

# Narrow window list: capture catppuccin's generated pill formats and wrap them
# in the per-client narrowness predicate (narrow branches live in
# responsive.conf). This file is always sourced after the plugin regenerates
# the formats, both at startup and on every theme flip via theme-sync-tmux, so
# the capture sees the fresh pill format. The guard makes a lone re-source of
# this file idempotent: once window-status-format holds our wrapper, don't
# capture the wrapper into the "wide" slot.
%if "#{==:#{m:*@resp_wsf_wide*,#{window-status-format}},0}"
set -gF @resp_wsf_wide  "#{window-status-format}"
set -gF @resp_wscf_wide "#{window-status-current-format}"
%endif
set -g window-status-format         "#{?#{E:@resp_is_narrow},#{E:@resp_ws_narrow},#{E:@resp_wsf_wide}}"
set -g window-status-current-format "#{?#{E:@resp_is_narrow},#{E:@resp_wsc_narrow},#{E:@resp_wscf_wide}}"

# Narrow clients drop the strip background so the bar reads as floating
# rounded pills. Every pill paints its own background, so text stays legible
# even when the client's terminal theme disagrees with the server-wide flavor
# (e.g. a dark phone terminal viewing latte); the mismatch is cosmetic. Wide
# clients keep the solid mantle strip: the catppuccin pill caps bake that
# color in and would render off-color edges on a transparent bar.
set -g status-style "bg=#{?#{E:@resp_is_narrow},default,#{@thm_mantle}},fg=#{@thm_fg}"

# A blank spacer row keeps the bar from touching the panes: the bar content
# moves to the second status line and line 0 renders empty, filled with the
# terminal background. Seeding copies tmux's default bar format into line 1,
# guarded so re-sourcing this file doesn't copy the spacer over the content.
set -g status 2
%if "#{==:#{status-format[1]},}"
set -gF 'status-format[1]' "#{status-format[0]}"
%endif
set -g 'status-format[0]' "#[fill=default]"


set -g pane-border-format " #P "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=cyan"

set-hook -g window-layout-changed 'set -w -F pane-border-status "#{?#{>:#{window_panes},1},top,off}"'
set-hook -g after-split-window    'set -w -F pane-border-status "#{?#{>:#{window_panes},1},top,off}"'
set-hook -g pane-exited           'set -w -F pane-border-status "#{?#{>:#{window_panes},1},top,off}"'

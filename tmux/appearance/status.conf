# Drop the session module on a narrow client (you know which session you're in).
set -g status-left "#{?#{E:@resp_is_narrow},,#{E:@catppuccin_status_session}#[bg=default] }"

# Catppuccin ships no bell module, so build @catppuccin_status_bell from the
# @catppuccin_bell_* inputs (set in alerts.conf) with its own module builder.
# This must run after the plugin loads, so it lives here rather than alongside
# the inputs.
%hidden MODULE_NAME="bell"
source -F "${TMUX_PLUGIN_MANAGER_PATH}/tmux/utils/status_module.conf"

# Remote-client host badge. tmux can't tell per-client whether a client is
# remote (no format var, and formats can't read env), so a client-attached hook
# inspects the client process (see tmux-client-remote) and stamps the session's
# @client_remote. Like the responsive `status` handling this is session-scoped,
# so it's only meaningful for a sole-client session; the guard skips stamping
# while a second client is attached. Re-evaluated on every (re)attach, including
# Mosh reconnects. @thm_peach follows the catppuccin flavor automatically.
set -g @client_remote 0
set-hook -g client-attached 'if -F "#{==:#{session_attached},1}" "run-shell -b \"tmux-client-remote #{session_name} #{client_pid}\""'

set -g status-right "#{?#{==:#{@client_remote},1},#[fg=#{@thm_peach}]󰒋 #h #[default],}#{?#{==:#(_tmux-bell-count),0},,#{E:@catppuccin_status_bell}}"


set -g pane-border-format " #P "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=cyan"

set-hook -g window-layout-changed 'set -w -F pane-border-status "#{?#{>:#{window_panes},1},top,off}"'
set-hook -g after-split-window    'set -w -F pane-border-status "#{?#{>:#{window_panes},1},top,off}"'
set-hook -g pane-exited           'set -w -F pane-border-status "#{?#{>:#{window_panes},1},top,off}"'

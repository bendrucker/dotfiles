# Where TPM installs external plugins
run 'tmux set-environment -g TMUX_PLUGIN_MANAGER_PATH "${XDG_DATA_HOME:-$HOME/.local/share}/tmux/plugins/"'

# Modules (order matters: core first, appearance before alerts).
# -F "#{d:current_file}/..." resolves relative to this file, so sourcing
# tmux.conf from a dev worktree reloads the worktree's modules, not the
# symlinked copy in ~/.dotfiles.
source-file -F "#{d:current_file}/core/core.conf"
source-file -F "#{d:current_file}/navigation/navigation.conf"
source-file -F "#{d:current_file}/session/session.conf"
source-file -F "#{d:current_file}/search/search.conf"
source-file -F "#{d:current_file}/appearance/appearance.conf"
source-file -F "#{d:current_file}/alerts/alerts.conf"
source-file -F "#{d:current_file}/usage/usage.conf"
source-file -q ~/.config/tmux/tmux.conf.local

# TPM
set -g @plugin 'tmux-plugins/tpm'
run '${XDG_DATA_HOME:-$HOME/.local/share}/tmux/plugins/tpm/tpm'

# Post-TPM: apply theme and start watcher
run 'tmux-style-sync'
run-shell -b 'pgrep -f "tmux-style-watch[.]swift" >/dev/null || _tmux-style-watch'

# Status modules (must load after TPM processes catppuccin)
source-file -F "#{d:current_file}/appearance/status.conf"

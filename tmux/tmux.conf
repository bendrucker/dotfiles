# Where TPM installs external plugins
run 'tmux set-environment -g TMUX_PLUGIN_MANAGER_PATH "${XDG_DATA_HOME:-$HOME/.local/share}/tmux/plugins/"'

# Modules (order matters: core first, appearance before alerts).
# Plain `source-file` paths are required: TPM's plugin discovery parses this
# file with a regex that only understands -q, not -F. Using `-F` here means
# TPM captures "-F" as the sourced filename and silently misses every
# @plugin declaration in our topic confs.
source-file ~/.config/tmux/core/core.conf
source-file ~/.config/tmux/core/unbinds.conf
source-file ~/.config/tmux/navigation/navigation.conf
source-file ~/.config/tmux/session/session.conf
source-file ~/.config/tmux/search/search.conf
source-file ~/.config/tmux/appearance/appearance.conf
source-file ~/.config/tmux/alerts/alerts.conf
source-file ~/.config/tmux/usage/usage.conf
source-file -q ~/.config/tmux/tmux.conf.local

# TPM
set -g @plugin 'tmux-plugins/tpm'
run '${XDG_DATA_HOME:-$HOME/.local/share}/tmux/plugins/tpm/tpm'

# Post-TPM: apply theme and start watcher
run 'theme-sync-tmux'
run-shell -b 'pgrep -f "_watch-theme-change[.]swift" >/dev/null || watch-theme-change'

# Status modules (must load after TPM processes catppuccin)
source-file ~/.config/tmux/appearance/status.conf

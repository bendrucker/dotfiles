source-file ~/.config/tmux/options.conf
source-file ~/.config/tmux/keys.conf
source-file ~/.config/tmux/hooks.conf
source-file ~/.config/tmux/plugins.conf
source-file -q ~/.config/tmux/tmux.conf.local
run '~/.config/tmux/plugins/tpm/tpm'
# Apply current macOS appearance at config load
run 'tmux-style-sync'
# Start background watcher for macOS appearance changes (singleton via pgrep guard)
run-shell -b 'pgrep -f "tmux-style-watch[.]swift" >/dev/null || tmux-style-watch'
source-file ~/.config/tmux/status.conf

# Tombstone log of removed bindings. `tmux source-file` doesn't unbind keys
# that disappear from the conf; they linger until the server restarts. Add
# `unbind <key>` here when removing a custom binding so reloads pick up the
# removal. Trim entries older than your longest-running tmux server.
#
# Permanent unbinds of tmux defaults (e.g. C-b, r) live with their topic.

# 2026-04: bindings consolidated; T (was sesh, now t) and o (tool launcher) removed
unbind T
unbind o

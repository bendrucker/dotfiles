# Prefix
set -g prefix C-s
unbind C-b

unbind r
bind -N "Reload tmux config" r source-file ~/.config/tmux/tmux.conf

# Terminal capabilities (true color, clickable links, system clipboard)
set -g default-terminal "tmux-256color"
set -ga terminal-features "*:RGB"
set -ga terminal-features "*:hyperlinks"
set -g set-clipboard on                    # copy mode selections → system clipboard via OSC 52
set -g allow-passthrough on                # let programs send escapes directly to outer terminal

# Usability
set -g history-limit 1000000
set -g mouse on
set -g escape-time 10                      # default 500ms adds lag when pressing Escape in editors
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on                     # apps detect pane/window focus changes

# Only break words on spaces and @ so double-click selects full URLs and ticket IDs
setw -g word-separators ' @'

# F12 suspends the outer prefix so inner (SSH'd) tmux can take keys.
# Status bar dims while suspended so you know which tmux is listening.
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=#{@thm_overlay_0},bg=#{@thm_mantle}" \;\
  refresh-client -S
bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

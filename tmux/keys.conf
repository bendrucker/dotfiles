# Splits inherit the current pane's working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Session switcher (sesh + fzf)
bind t run-shell -b tmux-sessions

# Window switcher (fzf)
bind w run-shell -b tmux-windows

# Jump to window with bell alert
bind b run-shell -b tmux-bell-jump

# Click status-right (bell indicator) to jump to bell window
bind -n MouseUp1StatusRight run-shell -b tmux-bell-jump

# Zoom — no dedicated hook, so wrap the binding to log it
bind z resize-pane -Z \; run-shell -b "tmux-usage-log pane-zoom"

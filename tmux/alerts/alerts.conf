# Bell indicator in status bar
set -g @catppuccin_bell_icon " "
set -g @catppuccin_bell_color "#{@thm_yellow}"
set -g @catppuccin_bell_text " #(_tmux-bell-count)"

# Alerted windows are already flagged by the window formats themselves (icon
# flags on wide pills, yellow chips on narrow). Neutralize tmux's merged
# alert styles: their solid background would otherwise paint behind the
# rounded chip caps and turn the chip into a rectangle.
set -g window-status-bell-style default
set -g window-status-activity-style default

# Jump to window with bell alert
bind b run-shell -b _tmux-bell-jump

# Click status-right (bell indicator) to jump to bell window
bind -n MouseUp1StatusRight run-shell -b _tmux-bell-jump

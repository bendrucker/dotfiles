# Splits inherit the current pane's working directory.
# `|` / `-` mirror the resulting split shape; `"` / `%` kept for muscle memory.
bind '"' split-window -v -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"

# Popups go near-fullscreen on a narrow client (see responsive.conf). Popup
# sizes are not format-expanded, so the bindings dispatch via `if -F`.
bind -N "Search prefix bindings" ? if -F "#{E:@resp_is_narrow}" \
  "display-popup -E -w 100% -h 100% tmux-keys" \
  "display-popup -E -w 60% -h 60% tmux-keys"

bind -N "Switch session" t if -F "#{E:@resp_is_narrow}" \
  "display-popup -E -w 100% -h 100% _tmux-sesh-picker" \
  "display-popup -E -w 80% -h 80% _tmux-sesh-picker"
bind -N "Switch window" w if -F "#{E:@resp_is_narrow}" \
  "display-popup -E -w 100% -h 100% _tmux-window-picker" \
  "display-popup -E -w 80% -h 80% _tmux-window-picker"

bind -N "Grab scrollback to clipboard" g run-shell tmux-grab-scrollback

bind -N "Open linked session for window browsing" X run-shell 'tmux new-session -d -t "#{session_name}" -s "#{session_name}-linked" 2>/dev/null; tmux switch-client -t "#{session_name}-linked"'

# Floating scratch session
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind '`'
set -g @floax-session-name 'scratch'
# Boot defaults; the responsive hooks flip the FLOAX_WIDTH/FLOAX_HEIGHT env
# vars the plugin reads per invocation (see responsive.conf).
set -g @floax-width '80%'
set -g @floax-height '80%'

# Smooth trackpad/mouse-wheel scrolling in panes
set -g @plugin 'azorng/tmux-smooth-scroll'

# Open files referenced in pane output in a neovim pane (prefix + e)
set -g @plugin 'trevarj/tmux-open-nvim'

# Splits inherit the current pane's working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind -N "Search prefix bindings" ? display-popup -E -w 60% -h 60% tmux-keys

set -g @plugin 'sainnhe/tmux-fzf'
set-environment -gu TMUX_FZF_LAUNCH_KEY
set-environment -g TMUX_FZF_OPTIONS "-p -w 60% -h 60%"

bind -N "Switch session" t display-popup -E -w 80% -h 80% "sesh connect \$(sesh list -i | fzf --no-sort --ansi --border --border-label ' sesh ' --prompt '  ')"
bind -N "Switch window" w run-shell -b '$TMUX_PLUGIN_MANAGER_PATH/tmux-fzf/scripts/window.sh switch'

bind -N "Grab scrollback to clipboard" g run-shell tmux-grab-scrollback

bind -N "Open linked session for window browsing" X run-shell 'tmux new-session -d -t "#{session_name}" -s "#{session_name}-linked" 2>/dev/null; tmux switch-client -t "#{session_name}-linked"'

# Floating scratch session
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind '`'
set -g @floax-session-name 'scratch'
set -g @floax-width '80%'
set -g @floax-height '80%'

# Smooth trackpad/mouse-wheel scrolling in panes
set -g @plugin 'azorng/tmux-smooth-scroll'

# Open files referenced in pane output in a neovim pane (prefix + e)
set -g @plugin 'trevarj/tmux-open-nvim'

# Mouse swipe gestures for window/session switching
set -g @plugin 'jaclu/tmux-mouse-swipe'

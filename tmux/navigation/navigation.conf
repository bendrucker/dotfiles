# Splits inherit the current pane's working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Session switcher (sesh + fzf)
bind t run-shell -b tmux-sessions

# Click session name to open session switcher
bind -n MouseUp1StatusLeft run-shell -b tmux-sessions

# Window switcher (fzf)
bind w run-shell -b tmux-windows

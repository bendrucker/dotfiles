# Splits inherit the current pane's working directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# tmux-fzf (session/window/pane switcher)
set -g @plugin 'sainnhe/tmux-fzf'
set-environment -gu TMUX_FZF_LAUNCH_KEY
set-environment -g TMUX_FZF_OPTIONS "-p -w 60% -h 60%"

# Prefix-t: switch session, Prefix-w: switch window (via tmux-fzf)
bind t run-shell -b '$TMUX_PLUGIN_MANAGER_PATH/tmux-fzf/scripts/session.sh switch'
bind w run-shell -b '$TMUX_PLUGIN_MANAGER_PATH/tmux-fzf/scripts/window.sh switch'

# Copy entire scrollback to system clipboard
bind g run-shell tmux-grab-scrollback

# Linked session for independent window browsing in a second terminal
bind X run-shell 'tmux new-session -d -t "#{session_name}" -s "#{session_name}-linked" 2>/dev/null; tmux switch-client -t "#{session_name}-linked"'

# Tool launcher — tmux-fzf's user menu, bound directly (bypassing its main menu).
# Each entry: `name\ncommand\n`. The per-invocation TMUX_FZF_MENU supplies the
# invoking pane's cwd via run-shell's #{} expansion, since menu.sh doesn't
# forward `-d` to `tmux popup`.
set-environment -g TMUX_FZF_MENU_POPUP 1
set-environment -g TMUX_FZF_MENU_POPUP_WIDTH 90%
set-environment -g TMUX_FZF_MENU_POPUP_HEIGHT 90%
bind o run-shell -b 'TMUX_FZF_MENU="lazygit\ncd \"#{pane_current_path}\" && lazygit\ngh dash\ncd \"#{pane_current_path}\" && gh dash\n" $TMUX_PLUGIN_MANAGER_PATH/tmux-fzf/scripts/menu.sh'

# Scratch session — toggle attach/detach a persistent workspace.
bind "\`" display-popup -E -w 80% -h 80% "tmux new-session -A -s scratch"

# Open links from terminal output via fzf. Custom schemes and their
# interpreter live in search/fzf-links/ (see its README).
set -g @plugin 'alberti42/tmux-fzf-links'
set -g @fzf-links-python '~/.config/tmux/search/fzf-links/python'
set -g @fzf-links-user-schemes-path '~/.config/tmux/search/fzf-links/user_schemes.py'

# Fuzzy search scrollback buffer
set -g @plugin 'roosta/tmux-fuzzback'
set -g @fuzzback-bind '/'
set -g @fuzzback-popup 1
set -g @fuzzback-popup-size '80%'
